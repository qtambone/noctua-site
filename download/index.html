<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Télécharger Noctua</title>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NGCVXYD9BP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    var ua = navigator.userAgent || navigator.vendor;
    var destination = /android/i.test(ua)
      ? "https://play.google.com/store/apps/details?id=com.noctuaapp.android"
      : "https://apps.apple.com/fr/app/noctua-citation-r%C3%A9flexion/id6758439405";

    gtag('config', 'G-NGCVXYD9BP', {
      'event_callback': function() {
        window.location.replace(destination);
      }
    });

    // Fallback: redirect after 2s si GA est bloqué (adblocker)
    setTimeout(function() {
      window.location.replace(destination);
    }, 2000);
  </script>
</head>
<body>
  <p>Redirection en cours…</p>
</body>
</html>
