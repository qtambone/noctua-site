<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noctua - Citation & Réflexion</title>
  <meta name="description" content="Noctua - Chaque jour, une pensée qui éveille. Citations inspirantes et anecdotes fascinantes.">
  <link rel="icon" type="image/png" href="app_icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #F0F0F0;
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Text */
    .available {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.2s forwards;
    }

    .app-name {
      font-size: 18px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.4s forwards;
    }

    /* Icon area */
    .icon-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 56px;
    }

    /* Large luminous glow behind — starts small, grows big */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      transform: translate(-50%, -50%) scale(0);
      background: radial-gradient(circle,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,0.15) 15%,
        rgba(255,255,255,0.08) 30%,
        rgba(255,255,255,0.03) 50%,
        transparent 70%
      );
      border-radius: 50%;
      animation: glowExpand 2.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    @keyframes glowExpand {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      20%  { opacity: 0.6; }
      50%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
    }

    /* Glass shell — appears first, empty */
    .icon-shell {
      position: relative;
      width: 240px;
      height: 240px;
      border-radius: 54px;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.15);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.85);
      animation: shellAppear 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 20px 60px rgba(0,0,0,0.5);
    }

    /* Glass reflection on shell */
    .icon-shell::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      height: 55%;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.1) 0%,
        rgba(255,255,255,0.04) 40%,
        transparent 100%
      );
      border-radius: 54px 54px 0 0;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes shellAppear {
      0%   { opacity: 0; transform: scale(0.85); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Actual icon image — materializes inside the shell */
    .icon-shell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: iconMaterialize 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }

    @keyframes iconMaterialize {
      0%   { opacity: 0; filter: brightness(2) blur(8px); }
      40%  { filter: brightness(1.3) blur(2px); }
      100% { opacity: 1; filter: brightness(1) blur(0); }
    }

    /* Bottom light reflection — grows under icon */
    .icon-light {
      position: absolute;
      bottom: -40px;
      left: 50%;
      width: 320px;
      height: 100px;
      transform: translateX(-50%) scaleX(0.3);
      background: radial-gradient(ellipse,
        rgba(255,255,255,0.1) 0%,
        rgba(255,255,255,0.04) 40%,
        transparent 70%
      );
      filter: blur(12px);
      opacity: 0;
      animation: lightSpread 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    @keyframes lightSpread {
      0%   { opacity: 0; transform: translateX(-50%) scaleX(0.3); }
      100% { opacity: 1; transform: translateX(-50%) scaleX(1); }
    }

    /* Badges */
    .badges {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s ease 2.2s forwards;
      padding-left: 8px;
    }

    .badges a {
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0.95;
    }

    .badges a:hover {
      transform: scale(1.05);
      opacity: 1;
    }

    .badges a img {
      height: 44px;
      width: auto;
    }

    .badge-google img {
      height: 35px;
    }

    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 16px;
      font-size: 13px;
    }

    .footer a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 480px) {
      .available { font-size: 28px; }
      .app-name { font-size: 16px; margin-bottom: 40px; }
      .icon-wrapper { width: 200px; height: 200px; }
      .icon-shell { width: 200px; height: 200px; border-radius: 46px; }
      .icon-shell::before { border-radius: 46px 46px 0 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="available">Disponible</h1>
    <p class="app-name">Noctua - Citation & Réflexion</p>

    <div class="icon-wrapper">
      <div class="glow"></div>
      <div class="icon-light"></div>
      <div class="icon-shell">
        <img src="app_icon.png" alt="Noctua" loading="eager">
      </div>
    </div>

    <div class="badges">
      <a href="https://apps.apple.com/fr/app/noctua-citation-r%C3%A9flexion/id6758439405">
        <img src="badge-appstore.svg" alt="Télécharger sur l'App Store">
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.noctuaapp.android" class="badge-google">
        <img src="badge-googleplay.svg" alt="Disponible sur Google Play">
      </a>
    </div>
  </div>

  <footer class="footer">
    <a href="fr/privacy/">Confidentialité</a>
    <a href="fr/terms/">CGU</a>
    <a href="fr/support/">Support</a>
  </footer>
</body>
</html>
